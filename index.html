<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Memory">
  <title>Memory · KBRail Edition</title>
  <!-- ONLINE --><script src="peerjs.min.js"></script><script src="metered-realtime.min.js"></script><!-- /ONLINE -->
  <style>
    :root {
      --bg: #0D0D0D;
      --surface: #1A1A1A;
      --surface2: #252525;
      --surface3: #2E2E2E;
      --magenta: #E20074;
      --magenta-l: #FF4FA3;
      --text: #FFFFFF;
      --text-dim: #888;
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html { height: 100%; }
    body {
      min-height: 100%; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
    }
    button { touch-action: manipulation; }
    input { -webkit-user-select: text; user-select: text; }
    img { -webkit-user-drag: none; -webkit-touch-callout: none; user-select: none; }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ── Start Screen ── */
    #screen-start {
      min-height: 100vh; min-height: 100dvh;
      flex-direction: column; align-items: center;
      justify-content: center; gap: 24px;
      padding: calc(20px + var(--sat)) calc(20px + var(--sar)) calc(20px + var(--sab)) calc(20px + var(--sal));
    }
    .start-logo { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .start-title {
      font-size: clamp(2.2rem, 8vw, 4rem); font-weight: 900; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, var(--magenta-l) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .start-sub { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.04em; text-align: center; }

    .setup-card {
      background: var(--surface); border: 1px solid #2a2a2a;
      border-radius: 16px; padding: 24px; width: 100%; max-width: 540px;
    }
    .setup-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;
    }
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      padding: 10px 18px; border: 1.5px solid var(--surface3);
      border-radius: 100px; background: transparent; color: var(--text);
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      flex: 1 1 auto; min-height: 44px;
    }
    .pill.active { background: var(--magenta); border-color: var(--magenta); color: #fff; }

    .player-rows { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .player-row { display: flex; align-items: center; gap: 10px; }
    .pdot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .pname-input {
      flex: 1; min-width: 0; background: var(--surface2); border: 1px solid var(--surface3);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-family: inherit; font-size: 16px; /* verhindert Auto-Zoom auf iOS */
      outline: none; transition: border-color 0.15s;
    }
    .pname-input:focus { border-color: var(--magenta); }

    .divider { height: 1px; background: #222; margin: 20px 0; }

    .btn-start {
      width: 100%; padding: 15px; background: var(--magenta); border: none;
      border-radius: 10px; color: #fff; font-family: inherit;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s, transform 0.1s; margin-top: 20px;
      letter-spacing: 0.03em; min-height: 50px;
    }
    .btn-start:active { transform: scale(0.98); }

    /* ── Game Screen ── */
    #screen-game {
      flex-direction: column; overflow: hidden;
      height: 100vh; height: 100dvh;
      touch-action: pan-y; /* blockiert Pinch-Zoom im Spiel, erlaubt Board-Scrollen */
    }

    .game-header {
      background: var(--surface); border-bottom: 1px solid #222;
      padding: calc(8px + var(--sat)) calc(12px + var(--sar)) 8px calc(12px + var(--sal));
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; z-index: 10;
    }
    .game-logo {
      font-weight: 900; font-size: 0.95rem; letter-spacing: 0.1em;
      color: var(--magenta-l); flex-shrink: 0;
    }
    .score-chips {
      display: flex; gap: 7px; flex: 1; min-width: 0;
      overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .score-chips::-webkit-scrollbar { display: none; }
    .chip {
      display: block; padding: 6px 11px;
      border-radius: 100px; font-size: 0.78rem; font-weight: 700;
      border: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
      flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; max-width: 160px;
    }
    .chip.active { border-color: currentColor; }
    .header-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-hdr {
      background: transparent; border: 1px solid var(--surface3); color: var(--text-dim);
      border-radius: 8px; padding: 7px 11px; cursor: pointer;
      font-family: inherit; font-size: 0.8rem; min-height: 36px;
    }

    .turn-banner {
      text-align: center; font-size: 0.82rem; font-weight: 700;
      padding: 6px calc(12px + var(--sar)) 6px calc(12px + var(--sal));
      transition: background 0.3s, color 0.3s; letter-spacing: 0.02em;
      flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .board-wrap {
      flex: 1; min-height: 0; overflow: hidden;
      padding: 10px calc(10px + var(--sar)) calc(10px + var(--sab)) calc(10px + var(--sal));
      display: flex; justify-content: center; align-items: center;
    }
    /* Bei großen Decks auf kleinen Screens: vertikal scrollen statt Mini-Karten */
    .board-wrap.scrolling {
      overflow-y: auto; align-items: flex-start;
      -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
    }
    .board { display: grid; gap: 6px; flex-shrink: 0; }

    /* ── Card ── */
    .card { cursor: pointer; perspective: 900px; }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d; transition: transform 0.38s ease;
      border-radius: 8px;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0; border-radius: 8px;
      overflow: hidden; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }
    .card-back {
      background-color: var(--surface2);
      border: 1.5px solid var(--surface3);
      background-image: /*CARD_BACK_URL*/url("assets/rueckeseite.svg");
      background-size: 88% 88%;
      background-position: center;
      background-repeat: no-repeat;
    }
    .card-front { transform: rotateY(180deg); background: #111; }
    .card-front img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card.matched { cursor: default; }
    .card.matched .card-front::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.82);
      border-radius: 8px;
      box-shadow: inset 0 0 0 2px var(--match-color, transparent);
    }
    /* Touch-Feedback statt Hover */
    .card:not(.matched):not(.flipped):active .card-inner {
      filter: brightness(1.35);
    }
    @media (hover: hover) {
      .pill:hover { border-color: var(--magenta-l); color: var(--magenta-l); }
      .pill.active:hover { background: var(--magenta); border-color: var(--magenta); color: #fff; }
      .btn-start:hover, .btn-again:hover { background: var(--magenta-l); }
      .btn-hdr:hover { border-color: var(--magenta-l); color: var(--magenta-l); }
      .card:not(.matched):not(.flipped):hover .card-inner {
        box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
      }
    }

    /* Schmale Screens: Chips umbrechen statt unsichtbar scrollen, Logo weicht */
    @media (max-width: 480px) {
      .score-chips { flex-wrap: wrap; }
      .chip { max-width: 128px; }
    }
    @media (max-width: 430px) {
      .game-logo { display: none; }
    }

    /* Kompakter Header auf niedrigen Landscape-Screens (Smartphone quer) */
    @media (max-height: 480px) {
      .game-header { padding-top: calc(5px + var(--sat)); padding-bottom: 5px; }
      .turn-banner { padding: 3px calc(12px + var(--sar)) 3px calc(12px + var(--sal)); font-size: 0.74rem; }
      .board-wrap { padding: 6px calc(8px + var(--sar)) calc(6px + var(--sab)) calc(8px + var(--sal)); }
      #screen-start { justify-content: flex-start; gap: 16px; }
      .start-title { font-size: 1.8rem; }
      .setup-card { padding: 18px; }
    }

    /* ── Win Screen ── */
    #screen-win {
      flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; min-height: 100dvh;
      gap: 20px; text-align: center; position: relative;
      padding: calc(20px + var(--sat)) calc(20px + var(--sar)) calc(20px + var(--sab)) calc(20px + var(--sal));
    }
    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    .win-emoji { font-size: clamp(2.6rem, 10vw, 4rem); }
    .win-title { font-size: clamp(1.6rem, 6vw, 3rem); font-weight: 900; line-height: 1.2; }
    .win-sub { color: var(--text-dim); font-size: 0.9rem; }

    .win-table {
      border-collapse: collapse; width: 100%; max-width: 380px;
      background: var(--surface); border-radius: 12px; overflow: hidden;
      border: 1px solid #222;
    }
    .win-table th {
      padding: 10px 16px; text-align: left; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);
      border-bottom: 1px solid #222;
    }
    .win-table td { padding: 10px 16px; border-bottom: 1px solid #1a1a1a; }
    .win-table tr:last-child td { border-bottom: none; }
    .win-row-gold td:first-child { font-size: 1.1rem; }

    .btn-again {
      padding: 14px 36px; background: var(--magenta); border: none;
      border-radius: 10px; color: #fff; font-family: inherit; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: background 0.15s;
      min-height: 50px;
    }

    /* ── Online-Lobby ── */
    [hidden] { display: none !important; }
    .mode-row { width: 100%; max-width: 540px; display: flex; gap: 8px; }
    .mode-row .pill { flex: 1; }
    .btn-secondary {
      background: transparent; border: 1.5px solid var(--surface3); color: var(--text);
    }
    .btn-secondary:active { background: var(--surface2); }
    .btn-back {
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-family: inherit; font-size: 0.85rem; width: 100%; padding: 10px;
      margin-top: 12px; min-height: 44px;
    }
    .lobby-sec .btn-start + .btn-start { margin-top: 10px; }
    .room-code {
      font-size: 2.4rem; font-weight: 900; letter-spacing: 0.25em;
      color: var(--magenta-l); text-align: center; padding: 8px 0 14px;
      -webkit-user-select: text; user-select: text;
    }
    .room-code-input {
      text-transform: uppercase; letter-spacing: 0.18em;
      font-weight: 700; text-align: center;
    }
    .lobby-actions { display: flex; gap: 8px; justify-content: center; }
    .lobby-actions .btn-hdr { flex: 1; max-width: 160px; }
    .lobby-hint { color: var(--text-dim); font-size: 0.8rem; text-align: center; margin-top: 12px; }
    .lobby-error {
      color: var(--magenta-l); background: rgba(226,0,116,0.12);
      border: 1px solid rgba(226,0,116,0.4); border-radius: 8px;
      padding: 10px 12px; font-size: 0.85rem; margin-bottom: 16px;
    }
    .roster-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px;
      background: var(--surface2); border-radius: 8px; font-size: 0.9rem; }
    .roster-row.offline { opacity: 0.4; }
    .roster-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .roster-tag { color: var(--text-dim); font-size: 0.75rem; flex-shrink: 0; }

    .slider-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    .slider-head .setup-label { margin-bottom: 0; }
    .pair-val { color: var(--magenta-l); font-weight: 800; font-size: 0.95rem; }
    .pair-slider {
      -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
      border-radius: 100px; background: var(--surface3); outline: none; margin: 6px 0 2px;
    }
    .pair-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 28px; height: 28px;
      border-radius: 50%; background: var(--magenta); border: 3px solid #fff; cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .pair-slider::-moz-range-thumb {
      width: 28px; height: 28px; border-radius: 50%; background: var(--magenta);
      border: 3px solid #fff; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .choice-btns { display: flex; gap: 8px; }
    .choice-btns .btn-start { flex: 1; margin-top: 0; }
    .public-toggle {
      display: flex; align-items: center; gap: 10px; margin-top: 16px;
      font-size: 0.9rem; cursor: pointer; -webkit-user-select: none; user-select: none;
    }
    .public-toggle input { width: 20px; height: 20px; accent-color: var(--magenta); flex-shrink: 0; }

    .browse-row {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 12px; margin-bottom: 8px; text-align: left;
      background: var(--surface2); border: 1px solid var(--surface3);
      border-radius: 8px; color: var(--text); font-family: inherit; cursor: pointer;
    }
    .browse-row:active { background: var(--surface3); }
    .browse-row .roster-name { font-weight: 700; }
    .browse-join { color: var(--magenta-l); font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
    @media (hover: hover) { .browse-row:hover { border-color: var(--magenta-l); } }

    .net-toast {
      text-align: center; padding: 5px 12px; font-size: 0.75rem; font-weight: 600;
      background: rgba(226,0,116,0.15); color: var(--magenta-l); flex-shrink: 0;
    }
    #net-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .overlay-box {
      background: var(--surface); border: 1px solid #333; border-radius: 16px;
      padding: 28px; text-align: center; display: flex; flex-direction: column;
      gap: 20px; max-width: 340px; font-size: 0.95rem; line-height: 1.4;
    }
  </style>
</head>
<body>

<!-- ── Start Screen ── -->
<div id="screen-start" class="screen">
  <div class="start-logo">
    <div class="start-title">Memory</div>
    <div class="start-sub">KBRail Edition &nbsp;·&nbsp; Findet die passenden Paare</div>
  </div>

  <div class="mode-row" id="mode-pills">
    <button class="pill active" data-v="local">Lokal spielen</button>
    <button class="pill" data-v="online" id="pill-online">Online spielen</button>
  </div>

  <div class="setup-card" id="card-local">
    <div class="setup-label">Anzahl Spieler</div>
    <div class="pill-row" id="player-pills">
      <button class="pill active" data-v="1">1</button>
      <button class="pill" data-v="2">2</button>
      <button class="pill" data-v="3">3</button>
      <button class="pill" data-v="4">4</button>
    </div>
    <div class="player-rows" id="player-rows"></div>

    <div class="divider"></div>

    <div class="slider-head">
      <span class="setup-label">Kartenpaare</span>
      <span class="pair-val" id="pair-val-local">15 Paare</span>
    </div>
    <input type="range" class="pair-slider" id="pair-slider-local" min="5" max="50" step="5" value="15" aria-label="Anzahl Kartenpaare">

    <button class="btn-start" id="btn-start">Spiel starten ▶</button>
  </div>

  <div class="setup-card" id="card-online" hidden>
    <div class="lobby-error" id="lobby-error" hidden></div>

    <div class="lobby-sec" id="sec-choice">
      <div class="choice-btns">
        <button class="btn-start" id="btn-goto-create">Spiel erstellen</button>
        <button class="btn-start btn-secondary" id="btn-goto-join">Per Code beitreten</button>
      </div>
      <div id="browse-wrap" hidden>
        <div class="setup-label" style="margin-top:22px">Dein Name</div>
        <input class="pname-input" id="browse-name" placeholder="Dein Name" autocomplete="off" maxlength="16" style="width:100%">
        <div class="setup-label" style="margin-top:16px">Offene Spiele</div>
        <div id="browse-list"></div>
      </div>
    </div>

    <div class="lobby-sec" id="sec-create" hidden>
      <div class="setup-label">Dein Name</div>
      <input class="pname-input" id="create-name" placeholder="Dein Name" autocomplete="off" maxlength="16" style="width:100%">
      <div class="divider"></div>
      <div class="slider-head">
        <span class="setup-label">Kartenpaare</span>
        <span class="pair-val" id="pair-val-online">15 Paare</span>
      </div>
      <input type="range" class="pair-slider" id="pair-slider-online" min="5" max="50" step="5" value="15" aria-label="Anzahl Kartenpaare">
      <label class="public-toggle" id="public-toggle-row" hidden>
        <input type="checkbox" id="create-public" checked>
        <span>🌐 In der offenen Lobby anzeigen</span>
      </label>
      <button class="btn-start" id="btn-create">Raum erstellen</button>
      <button class="btn-back" id="btn-create-back">← Zurück</button>
    </div>

    <div class="lobby-sec" id="sec-join" hidden>
      <div class="setup-label">Raum-Code</div>
      <input class="pname-input room-code-input" id="join-code" placeholder="•••" maxlength="3"
             autocomplete="off" autocapitalize="characters" spellcheck="false" style="width:100%">
      <div class="setup-label" style="margin-top:16px">Dein Name</div>
      <input class="pname-input" id="join-name" placeholder="Dein Name" autocomplete="off" maxlength="16" style="width:100%">
      <button class="btn-start" id="btn-join">Beitreten</button>
      <button class="btn-back" id="btn-join-back">← Zurück</button>
    </div>

    <div class="lobby-sec" id="sec-connecting" hidden>
      <div class="lobby-hint" id="connecting-text">Verbinde…</div>
      <button class="btn-back" id="btn-connecting-back">Abbrechen</button>
    </div>

    <div class="lobby-sec" id="sec-host" hidden>
      <div class="setup-label">Raum-Code</div>
      <div class="room-code" id="room-code-display"></div>
      <div class="lobby-hint" id="host-visibility" style="margin-top:0;margin-bottom:14px"></div>
      <div class="lobby-actions">
        <button class="btn-hdr" id="btn-copy">Link kopieren</button>
        <button class="btn-hdr" id="btn-share" hidden>Teilen</button>
      </div>
      <div class="divider"></div>
      <div class="setup-label">Spieler</div>
      <div class="player-rows" id="host-roster"></div>
      <button class="btn-start" id="btn-online-start" disabled style="margin-top:20px">Spiel starten ▶</button>
      <div class="lobby-hint" id="host-hint">Mindestens 2 Spieler zum Starten</div>
      <button class="btn-back" id="btn-host-back">← Raum schließen</button>
    </div>

    <div class="lobby-sec" id="sec-wait" hidden>
      <div class="setup-label">Raum <span id="wait-code"></span></div>
      <div class="player-rows" id="wait-roster"></div>
      <div class="lobby-hint">Warten auf den Host…</div>
      <button class="btn-back" id="btn-wait-back">← Verlassen</button>
    </div>

  </div>
</div>

<!-- ── Game Screen ── -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="game-logo">MEMORY</div>
    <div class="score-chips" id="score-chips"></div>
    <div class="header-btns">
      <button class="btn-hdr" id="btn-fullscreen" title="Vollbild" hidden>⛶</button>
      <button class="btn-hdr" id="btn-reset">↩ Neu</button>
    </div>
  </div>
  <div class="turn-banner" id="turn-banner"></div>
  <div class="net-toast" id="net-toast" hidden></div>
  <div class="board-wrap" id="board-wrap">
    <div class="board" id="board"></div>
  </div>
</div>

<!-- ── Win Screen ── -->
<div id="screen-win" class="screen">
  <canvas id="confetti-canvas"></canvas>
  <div class="win-emoji" id="win-emoji"></div>
  <div class="win-title" id="win-title"></div>
  <div class="win-sub" id="win-sub"></div>
  <table class="win-table" id="win-table"></table>
  <div class="win-sub" id="win-wait" hidden>Warten auf den Host…</div>
  <button class="btn-again" id="btn-again">Nochmal spielen</button>
  <button class="btn-again btn-secondary" id="btn-leave" hidden>Verlassen</button>
</div>

<!-- ── Netz-Overlay (Host weg / Spiel beendet) ── -->
<div id="net-overlay" hidden>
  <div class="overlay-box">
    <div id="net-overlay-text"></div>
    <button class="btn-again" id="btn-overlay-ok">Zurück zum Start</button>
  </div>
</div>

/* ── Config ── */

/* ── State ── */
let numPlayers = 1, numPairs = 15;
let names = [], scores = [], currentPlayer = 0;
let flipped = [], matched = 0, canFlip = true, moves = 0;
let startTime = 0;
let gameGen = 0; // entwertet ausstehende Timer alter Spiele

/* Online-State */
let netRole = 'local';   // 'local' | 'host' | 'guest'
let netPhase = 'idle';   // 'idle' | 'hosting' | 'playing'
let myIndex = 0;         // eigener Spielerindex (online)
let roster = [];         // [{name, connected}] — Index = Spielerindex, 0 = Host
let deck = [];           // aktuelles Deck als IMAGES-Indizes

/* ── Helpers ── */
const $ = id => document.getElementById(id);
const imgSrc = f => f.startsWith('data:') ? f : IMAGE_BASE + encodeURIComponent(f);
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}
function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  return s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;
}

/* ── Pill Groups ── */
function makePills(groupId, onSelect) {
  document.querySelectorAll(`#${groupId} .pill`).forEach(p => {
    p.addEventListener('click', () => {
      document.querySelectorAll(`#${groupId} .pill`).forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      onSelect(p.dataset.v);
    });
  });
}

makePills('player-pills', v => { numPlayers = +v; renderNameInputs(); });

// Kartenpaare-Slider (5er-Schritte, 5–50); ein Slider je Modus, gemeinsames numPairs
function setupPairSlider(sliderId, valId) {
  const s = $(sliderId), v = $(valId);
  const update = () => { numPairs = +s.value; v.textContent = `${s.value} Paare`; };
  s.addEventListener('input', update);
  return update;
}
const updateLocalPairs = setupPairSlider('pair-slider-local', 'pair-val-local');
const updateOnlinePairs = setupPairSlider('pair-slider-online', 'pair-val-online');
updateLocalPairs();

/* ── Player Name Inputs ── */
function renderNameInputs() {
  const container = $('player-rows');
  container.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    const row = document.createElement('div');
    row.className = 'player-row';
    const dot = document.createElement('div');
    dot.className = 'pdot';
    dot.style.background = COLORS[i];
    const inp = document.createElement('input');
    inp.className = 'pname-input';
    inp.placeholder = `Spieler ${i + 1}`;
    inp.autocomplete = 'off';
    inp.value = names[i] || '';
    inp.addEventListener('input', e => names[i] = e.target.value);
    row.appendChild(dot); row.appendChild(inp);
    container.appendChild(row);
  }
}

/* ── Screen Switch ── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ── Start Game ── */
function enterGame(deckArr, playerNames) {
  names = playerNames;
  numPlayers = names.length;
  scores = Array(numPlayers).fill(0);
  currentPlayer = 0; flipped = []; matched = 0; canFlip = true; moves = 0;
  startTime = Date.now();
  buildBoard(deckArr);
  renderChips();
  updateBanner();
  hideToast();
  $('btn-reset').textContent = netRole === 'guest' ? '✕ Verlassen' : '↩ Neu';
  show('screen-game');
  applyLayout();
  requestWakeLock();
}

$('btn-start').addEventListener('click', () => {
  gameGen++;
  netRole = 'local';
  const inputs = $('player-rows').querySelectorAll('input');
  const localNames = Array.from(inputs).map((inp, i) => inp.value.trim() || `Spieler ${i + 1}`);
  enterGame(makeDeck(numPairs), localNames);
});

$('btn-reset').addEventListener('click', () => {
  leaveOnline();
  gameGen++; show('screen-start'); releaseWakeLock();
});
$('btn-again').addEventListener('click', () => {
  if (netRole === 'host') { startOnlineGame(); return; } // Rematch
  leaveOnline();
  gameGen++; show('screen-start'); releaseWakeLock();
});
$('btn-leave').addEventListener('click', () => {
  leaveOnline();
  gameGen++; show('screen-start'); releaseWakeLock();
});

/* ── iOS: :active-Feedback aktivieren, Pinch-Zoom im Spiel unterbinden ── */
document.addEventListener('touchstart', () => {}, { passive: true });
document.addEventListener('gesturestart', e => {

});

/* ── Vollbild (Android/Desktop; auf iPhone nicht verfügbar) ── */
const fsBtn = $('btn-fullscreen');
if (document.documentElement.requestFullscreen) {
  fsBtn.hidden = false;
  fsBtn.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
}

/* ── Bildschirm anlassen, solange gespielt wird ── */
let wakeLock = null;
async function requestWakeLock() {
  try { wakeLock = await navigator.wakeLock?.request('screen'); } catch (e) {}
}
function releaseWakeLock() {
  wakeLock?.release().catch(() => {}); wakeLock = null;
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && $('screen-game').classList.contains('active')) requestWakeLock();
});

/* ── Layout: quadratische Karten, Raster passt sich an Ausrichtung an ── */
let totalCards = 30;
function applyLayout() {
  const board = $('board');
  const wrap = $('board-wrap');
  if (!$('screen-game').classList.contains('active')) return;

  const cs = getComputedStyle(wrap);
  const availW = wrap.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const availH = wrap.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
  if (availW <= 0 || availH <= 0) return; // noch nicht gerendert — ResizeObserver holt das nach

  // Beste Spaltenzahl suchen: maximiert die Kartengröße im verfügbaren Raum
  let best = { size: 0, cols: 2 };
  for (let cols = 2; cols <= totalCards; cols++) {
    const rows = Math.ceil(totalCards / cols);
    const byW = (availW - (cols - 1) * GAP) / cols;
    const byH = (availH - (rows - 1) * GAP) / rows;
    const size = Math.min(byW, byH);
    if (size > best.size) best = { size, cols };
  }

  let { size, cols } = best;
  let scrolling = false;
  if (size < MIN_CARD) {
    // Passt nicht ohne Mini-Karten → Breite ausnutzen, vertikal scrollen
    cols = Math.min(totalCards, Math.max(2, Math.floor((availW + GAP) / (MIN_CARD + GAP))));
    size = (availW - (cols - 1) * GAP) / cols;
    scrolling = true;
  }
  size = Math.floor(Math.min(size, MAX_CARD));

  wrap.classList.toggle('scrolling', scrolling);
  board.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
  board.style.gridAutoRows = `${size}px`;
}

let layoutTimer = 0;
function queueLayout() {
  clearTimeout(layoutTimer);
  layoutTimer = setTimeout(applyLayout, 50);
}
window.addEventListener('resize', queueLayout);
window.addEventListener('orientationchange', queueLayout);
window.visualViewport?.addEventListener('resize', queueLayout);
// Fängt jede Größenänderung des Containers ab (Rotation, ein-/ausblendende Browser-UI)
new ResizeObserver(queueLayout).observe($('board-wrap'));

/* ── Build Board ── */
function makeDeck(nPairs) {
  const chosen = shuffle(IMAGES.map((_, i) => i)).slice(0, nPairs);
  return shuffle([...chosen, ...chosen]);
}

const boardCards = () => [...$('board').children];

function buildBoard(deckArr) {
  const board = $('board');
  board.innerHTML = '';
  deck = deckArr;
  numPairs = deckArr.length / 2;
  totalCards = deckArr.length;

  // Ausgewählte Motive vorladen, damit die erste Aufdeckung nicht ruckelt
  [...new Set(deckArr)].forEach(i => { const im = new Image(); im.src = imgSrc(IMAGES[i]); });

  deckArr.forEach((imgIdx, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.img = imgIdx;  // Motiv-Index — Paarvergleich wie bisher über dataset.img
    card.dataset.idx = i;       // Board-Position — Kennung im Netzwerkprotokoll
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front">
          <img src="${imgSrc(IMAGES[imgIdx])}" alt="" decoding="async" draggable="false">
        </div>
      </div>`;
    card.addEventListener('click', () => onCardClick(card));
    board.appendChild(card);
  });
}

/* ── Card Click ── */
function onCardClick(card) {
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (netRole === 'guest') {
    // Gast mutiert nichts lokal — nur Flip-Wunsch an den Host, der Echo kommt zurück
    if (myIndex === currentPlayer && canFlip && flipped.length < 2)
      netSend(hostConn, { v: PROTO_V, t: 'flip', card: +card.dataset.idx });
    return;
  }
  if (netRole === 'host' && currentPlayer !== myIndex) return;
  if (!canFlip || flipped.length >= 2) return;
  doFlip(card, currentPlayer);
}

/* Host + Lokal: Karte aufdecken und ggf. Paar auflösen */
function doFlip(card, by) {
  card.classList.add('flipped');
  flipped.push(card);
  if (netRole === 'host') broadcast({ v: PROTO_V, t: 'flip', card: +card.dataset.idx, by });

  if (flipped.length < 2) return;

  canFlip = false;
  moves++;

  const [a, b] = flipped;
  const isMatch = a.dataset.img === b.dataset.img;
  let auth = null;
  if (netRole === 'host') {
    // Ergebnis vorab autoritativ berechnen und sofort broadcasten —
    // die 450/900-ms-Animation läuft dann auf allen Clients synchron in resolvePair
    auth = hostComputeResult(isMatch, by);
    broadcast({ v: PROTO_V, t: 'result', kind: auth.kind, cards: [+a.dataset.idx, +b.dataset.idx],
                by, scores: auth.scores, next: auth.next, done: auth.done });
  }
  resolvePair(a, b, isMatch, by, gameGen, auth);
}

function nextConnected(from) {
  for (let k = 1; k <= numPlayers; k++) {
    const i = (from + k) % numPlayers;
    if (roster[i]?.connected !== false) return i; // lokal: roster leer -> jeder gilt als verbunden
  }
  return (from + 1) % numPlayers;
}

function hostComputeResult(isMatch, by) {
  const s = scores.slice();
  let next = by, done = false;
  if (isMatch) { s[by]++; done = matched + 1 === numPairs; }
  else next = nextConnected(by);
  return { kind: isMatch ? 'match' : 'miss', scores: s, next, done };
}

/* Gemeinsame Paar-Auflösung für Lokal, Host und Gast — identisches Timing.
   `auth` (nur online): autoritative Scores/Folgespieler vom Host statt lokaler Berechnung. */
function resolvePair(a, b, isMatch, by, gen, auth) {
  setTimeout(() => {
    if (gen !== gameGen) return;
    if (isMatch) {
      const color = COLORS[by];
      [a, b].forEach(c => {
        c.classList.add('matched');
        c.classList.remove('flipped');
        c.style.setProperty('--match-color', color);
        c.dataset.matchedBy = by;
      });
      if (auth) scores = auth.scores.slice(); else scores[by]++;
      matched++;
    } else {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
    }
    flipped = []; canFlip = true;
    currentPlayer = auth ? auth.next : (isMatch ? by : nextConnected(by));
    renderChips();
    const done = auth ? auth.done : (isMatch && matched === numPairs);
    if (done) {
      setTimeout(() => { if (gen === gameGen) showWin(); }, 500);
      return;
    }
    if (isMatch) {
      if (numPlayers === 1) updateBanner();
      else if (netRole !== 'local' && by === myIndex) updateBanner('✓ Treffer! Du bist nochmal dran');
      else updateBanner(`✓ Treffer! ${names[by]} nochmal`);
    } else updateBanner();
  }, isMatch ? 450 : 900);
}

/* ── UI Updates ── */
function renderChips() {
  const container = $('score-chips');
  container.innerHTML = '';
  names.forEach((name, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (i === currentPlayer ? ' active' : '');
    chip.style.color = COLORS[i];
    chip.style.background = COLORS_BG[i];
    const me = netRole !== 'local' && i === myIndex ? ' (du)' : '';
    chip.textContent = `${name}${me}  ${scores[i]}`;
    if (netRole !== 'local' && roster[i]?.connected === false) chip.style.opacity = '0.4';
    container.appendChild(chip);
  });
  // Aktiven Spieler-Chip sichtbar halten, falls die Zeile scrollt
  container.querySelector('.chip.active')?.scrollIntoView({ block: 'nearest', inline: 'nearest' });
}

function updateBanner(msg) {
  const b = $('turn-banner');
  b.style.background = COLORS_BG[currentPlayer];
  b.style.color = COLORS[currentPlayer];
  if (msg) { b.textContent = msg; return; }
  if (numPlayers === 1) { b.textContent = `Züge: ${moves}  ·  Gefunden: ${matched} / ${numPairs}`; return; }
  b.textContent = netRole !== 'local' && currentPlayer === myIndex
    ? 'Du bist dran'
    : `${names[currentPlayer]} ist dran`;
}

/* ── Win Screen ── */
function showWin() {
  releaseWakeLock();
  const elapsed = Date.now() - startTime;
  const sorted = names.map((n, i) => ({ n, s: scores[i], i }))
    .sort((a, b) => b.s - a.s);

  $('win-emoji').textContent = numPlayers === 1 ? '🎉' : '🏆';

  if (numPlayers === 1) {
    $('win-title').textContent = 'Geschafft!';
    $('win-sub').textContent = `${moves} Züge · ${fmtTime(elapsed)} · ${numPairs} Paare`;
  } else {
    const tied = sorted.length > 1 && sorted[0].s === sorted[1].s;
    $('win-title').textContent = tied ? 'Unentschieden!' : `${sorted[0].n} gewinnt!`;
    $('win-sub').textContent = `${numPairs} Paare · ${fmtTime(elapsed)}`;
  }

  const tbl = $('win-table');
  tbl.innerHTML = `<tr><th>#</th><th>Spieler</th><th style="text-align:right">Paare</th></tr>`;
  let rank = 0, prevScore = null;
  sorted.forEach((p, idx) => {
    if (p.s !== prevScore) { rank = idx; prevScore = p.s; }
    const tr = document.createElement('tr');
    if (rank === 0) tr.className = 'win-row-gold';
    const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : rank + 1;
    tr.innerHTML = `
      <td style="color:${COLORS[p.i]}">${medal}</td>
      <td style="font-weight:700"></td>
      <td style="text-align:right;color:${COLORS[p.i]};font-weight:700">${p.s}</td>`;
    tr.children[1].textContent = p.n;
    tr.children[1].style.fontWeight = '700';
    tbl.appendChild(tr);
  });

  // Online: nur der Host darf ein Rematch starten
  $('btn-again').hidden = netRole === 'guest';
  $('win-wait').hidden = netRole !== 'guest';
  $('btn-leave').hidden = netRole === 'local';

  show('screen-win');
  confetti();
}

/* ── Confetti ── */
function confetti() {
  const canvas = $('confetti-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const cols = ['#E20074','#FF4FA3','#00B4D8','#7CB518','#F77F00','#fff','#ffd700'];
  const pieces = Array.from({ length: 140 }, () => ({
    x: Math.random() * W,
    y: -20 - Math.random() * H * 0.5,
    w: 7 + Math.random() * 7, h: 4 + Math.random() * 5,
    color: cols[Math.floor(Math.random() * cols.length)],
    speed: 2.5 + Math.random() * 3.5,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.18,
    drift: (Math.random() - 0.5) * 1.5,
  }));
  let raf;
  (function draw() {
    ctx.clearRect(0, 0, W, H);
    let done = true;
    pieces.forEach(p => {
      p.y += p.speed; p.x += p.drift; p.angle += p.spin;
      if (p.y < H + 20) done = false;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    if (!done) raf = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, W, H);
  })();
  setTimeout(() => { cancelAnimationFrame(raf); ctx.clearRect(0, 0, W, H); }, 5000);
}

/* ── Netzwerk (Online-Modus über PeerJS, host-autoritativ) ── */
const PROTO_V = 1;
const NET_PREFIX = 'kbr-memory-';
const CODE_ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // ohne 0/O, 1/I

/* TURN-Relay (Fallback, wenn keine Direktverbindung möglich ist — Mobilfunk-/Firmennetze).
   Kostenloses Konto auf https://dashboard.metered.ca anlegen und beide Werte eintragen.
   Bleiben sie leer, läuft alles wie bisher über reines STUN. */
const METERED_DOMAIN = 'kbr-memory.metered.live';  // z. B. 'kbrmemory.metered.live'
const METERED_KEY = '1713c7562f5b3d7cd627fdd6f495c22bfc8b';     // API-Key aus dem Metered-Dashboard

/* Offene Lobby (Live-Raumliste) über Metered Realtime Messaging.
   Publishable-Key (pk_...) aus dem Metered-Dashboard → Realtime Messaging → Keys.
   Bleibt er leer, wird die offene Lobby ausgeblendet; Code-System läuft normal weiter. */
const METERED_RT_KEY = 'pk_live_f4f7506eb61c5e47650f03c639bf67c86b27a8cd';
const LOBBY_CHANNEL = 'kbr-lobby';
const RT_LIB = (typeof MeteredPeer !== 'undefined' && MeteredPeer.SignallingClient) ? MeteredPeer.SignallingClient : null;
const lobbyEnabled = () => !!(RT_LIB && METERED_RT_KEY);

let iceServersCache = null;
async function getIceServers() {
  if (iceServersCache) return iceServersCache;
  const fallback = [{ urls: 'stun:stun.l.google.com:19302' }];
  if (!METERED_DOMAIN || !METERED_KEY) return fallback;
  try {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 4000);
    const res = await fetch(`https://${METERED_DOMAIN}/api/v1/turn/credentials?apiKey=${METERED_KEY}`,
                            { signal: ctrl.signal });
    clearTimeout(to);
    const list = await res.json();
    if (Array.isArray(list) && list.length) { iceServersCache = list; return list; }
  } catch (e) {} // Dienst nicht erreichbar -> STUN-only wie bisher
  return fallback;
}

/* ── Offene Lobby via Metered Realtime (nur Raum-Registry; Spiel bleibt PeerJS-P2P) ──
   Presence-Metadaten sind mit einem pk_-Key nicht setzbar, daher werden Rauminfos
   als Channel-Nachrichten verteilt. Räume werden nach der Sender-peerId (`from`)
   indiziert — verschwindet ein Host (presence `left`), fällt sein Raum automatisch raus. */
let rtHost = null, hostRoomMeta = null;

async function hostLobbyStart(meta) {
  if (!lobbyEnabled()) return;
  hostRoomMeta = meta;
  try {
    const c = new RT_LIB({ apiKey: METERED_RT_KEY });
    rtHost = c;
    c.on('message', ({ data }) => { if (data && data.k === 'query') announceRoom(); });
    await c.connect();
    if (rtHost !== c) { try { await c.close(); } catch (e) {} return; }
    await c.subscribe(LOBBY_CHANNEL);
    announceRoom();
  } catch (e) { rtHost = null; } // Lobby ist optional — Fehler nicht fatal
}
function announceRoom() {
  if (rtHost && hostRoomMeta) rtHost.publish(LOBBY_CHANNEL, { k: 'room', ...hostRoomMeta }).catch(() => {});
}
function hostLobbyUpdate(patch) {
  if (!hostRoomMeta) return;
  hostRoomMeta = { ...hostRoomMeta, ...patch };
  announceRoom();
}
async function hostLobbyStop() {
  const c = rtHost, meta = hostRoomMeta;
  rtHost = null; hostRoomMeta = null;
  if (!c) return;
  try { if (meta) await c.publish(LOBBY_CHANNEL, { k: 'closed', code: meta.code }); } catch (e) {}
  try { await c.close(); } catch (e) {}
}

let rtBrowse = null, browseRooms = new Map(), browseCb = null;
async function browseStart(onChange) {
  browseCb = onChange;
  browseRooms.clear();
  if (!lobbyEnabled()) { onChange('unavailable'); return; }
  try {
    const c = new RT_LIB({ apiKey: METERED_RT_KEY });
    rtBrowse = c;
    c.on('message', ({ from, data }) => {
      if (!data) return;
      if (data.k === 'room') { browseRooms.set(from, { ...data, from }); emitRooms(); }
      else if (data.k === 'closed') {
        for (const [pid, r] of browseRooms) if (r.code === data.code) browseRooms.delete(pid);
        emitRooms();
      }
    });
    c.on('presence', ({ left }) => {
      let changed = false;
      (left || []).forEach(p => { if (browseRooms.delete(p.peerId)) changed = true; });
      if (changed) emitRooms();
    });
    await c.connect();
    if (rtBrowse !== c) { try { await c.close(); } catch (e) {} return; }
    await c.subscribe(LOBBY_CHANNEL);
    await c.publish(LOBBY_CHANNEL, { k: 'query' });
    emitRooms();
  } catch (e) { rtBrowse = null; browseCb?.('error'); }
}
function emitRooms() {
  if (browseCb) browseCb([...browseRooms.values()].filter(r => (r.players || 0) < (r.max || 4)));
}
async function browseStop() {
  browseCb = null;
  const c = rtBrowse; rtBrowse = null; browseRooms.clear();
  if (c) { try { await c.close(); } catch (e) {} }
}

let peer = null;       // eigener PeerJS-Peer
let hostConn = null;   // Gast: DataConnection zum Host
let conns = [];        // Host: DataConnection je Spielerindex (0 = Host selbst = null)
let roomCode = '';

const myCid = (() => {  // stabile Kennung pro Tab — erlaubt Rejoin nach Reload
  let c = sessionStorage.getItem('kbr-cid');
  if (!c) {
    c = [...crypto.getRandomValues(new Uint8Array(4))].map(b => b.toString(16).padStart(2, '0')).join('');
    sessionStorage.setItem('kbr-cid', c);
  }
  return c;
})();

function netSend(conn, msg) { try { conn?.send(msg); } catch (e) {} }
function broadcast(msg) { conns.forEach(c => netSend(c, msg)); }
const publicRoster = () => roster.map(r => ({ name: r.name, connected: r.connected }));

function randomCode() {
  return [...crypto.getRandomValues(new Uint8Array(3))]
    .map(b => CODE_ALPHABET[b % CODE_ALPHABET.length]).join('');
}

function deferredDestroy() {
  // Peer erst nach kurzer Frist zerstören, damit letzte Nachrichten (end/bye) noch rausgehen
  const old = peer;
  peer = null; hostConn = null; conns = [];
  setTimeout(() => { try { old?.destroy(); } catch (e) {} }, 500);
}

function destroyPeer() {
  try { peer?.destroy(); } catch (e) {}
  peer = null; hostConn = null; conns = [];
}

function resetNet() {
  destroyPeer();
  netRole = 'local'; netPhase = 'idle';
  roster = []; myIndex = 0; roomCode = '';
  gameGen++;
}

function leaveOnline() {
  if (netRole === 'host') { broadcast({ v: PROTO_V, t: 'end', reason: 'abort' }); hostLobbyStop(); }
  else if (netRole === 'guest') netSend(hostConn, { v: PROTO_V, t: 'bye' });
  else return;
  deferredDestroy();
  netRole = 'local'; netPhase = 'idle';
  roster = []; myIndex = 0; roomCode = '';
  gameGen++;
  setLobbyPhase('choice');
}

function netErrText(err) {
  if (err?.type === 'peer-unavailable') return 'Raum nicht gefunden – Code prüfen.';
  if (err?.type === 'network' || err?.type === 'server-error' || err?.type === 'socket-error')
    return 'Verbindungsdienst nicht erreichbar – Internetverbindung prüfen und erneut versuchen.';
  return 'Verbindung fehlgeschlagen – bitte erneut versuchen.';
}

/* ── Host-Seite ── */
let roomPublic = true; // Öffentlich-Schalter beim Erstellen
function updateHostVisibility() {
  const el = $('host-visibility');
  const publicNow = roomPublic && lobbyEnabled();
  el.textContent = publicNow ? '🌐 In der offenen Lobby sichtbar' : '🔒 Privat – nur per Code';
}

async function createRoom(hostName, attempt = 0) {
  if (attempt >= 3) { lobbyError('Raum konnte nicht erstellt werden – bitte erneut versuchen.'); return; }
  destroyPeer();
  roomCode = randomCode();
  setLobbyPhase('connecting', 'Erstelle Raum…');
  const iceServers = await getIceServers();
  peer = new Peer(NET_PREFIX + roomCode, { config: { iceServers } });
  const p = peer;
  p.on('open', () => {
    if (p !== peer) return;
    netRole = 'host'; netPhase = 'hosting'; myIndex = 0;
    roster = [{ name: hostName, cid: myCid, connected: true }];
    conns = [null];
    renderLobby();
    setLobbyPhase('host');
    updateHostVisibility();
    if (roomPublic) hostLobbyStart({ code: roomCode, host: hostName, players: 1, max: 4 });
    requestWakeLock(); // schläft das Host-Gerät ein, stirbt der Raum
  });
  p.on('error', err => {
    if (p !== peer) return;
    if (err.type === 'unavailable-id') { createRoom(hostName, attempt + 1); return; }
    resetNet();
    lobbyError(netErrText(err));
  });
  p.on('connection', conn => {
    conn.on('data', msg => hostOnData(conn, msg));
    conn.on('close', () => hostOnClose(conn));
    conn.on('error', () => hostOnClose(conn));
  });
  p.on('disconnected', () => { try { p.reconnect(); } catch (e) {} });
}

function hostOnData(conn, msg) {
  if (!msg || msg.v !== PROTO_V) {
    netSend(conn, { v: PROTO_V, t: 'reject', reason: 'version' });
    return;
  }
  switch (msg.t) {
    case 'join': hostOnJoin(conn, msg); break;
    case 'flip':
      if (conn._idx >= 1 && netPhase === 'playing') hostHandleFlip(conn._idx, msg.card);
      break;
    case 'bye': hostOnClose(conn); break;
  }
}

function hostOnJoin(conn, msg) {
  const name = String(msg.name || '').trim().slice(0, 16) || 'Gast';
  const existing = roster.findIndex(r => r.cid === msg.cid);
  if (existing >= 1) {
    // Rejoin eines bekannten Gasts (z. B. nach Reload)
    try { conns[existing]?.close(); } catch (e) {}
    conn._idx = existing;
    conns[existing] = conn;
    roster[existing].connected = true;
    roster[existing].name = name;
    netSend(conn, { v: PROTO_V, t: 'welcome', you: existing, roster: publicRoster() });
    if (netPhase === 'playing') netSend(conn, stateSnapshot(existing));
    rosterChanged();
    if (netPhase === 'playing') showToast(`${name} ist wieder da`);
    return;
  }
  if (netPhase === 'playing') { netSend(conn, { v: PROTO_V, t: 'reject', reason: 'started' }); return; }
  if (roster.length >= 4) { netSend(conn, { v: PROTO_V, t: 'reject', reason: 'full' }); return; }
  const idx = roster.length;
  conn._idx = idx;
  roster.push({ name, cid: msg.cid, connected: true });
  conns[idx] = conn;
  netSend(conn, { v: PROTO_V, t: 'welcome', you: idx, roster: publicRoster() });
  rosterChanged();
}

function rosterChanged() {
  broadcast({ v: PROTO_V, t: 'roster', roster: publicRoster() });
  names = roster.map(r => r.name);
  if (netPhase === 'playing') { renderChips(); updateBanner(); }
  else { renderLobby(); hostLobbyUpdate({ players: roster.filter(r => r.connected !== false).length }); }
}

function hostOnClose(conn) {
  const idx = conn._idx;
  if (!idx || idx < 1 || conns[idx] !== conn) return;
  conns[idx] = null;
  roster[idx].connected = false;
  rosterChanged();
  if (netPhase !== 'playing') return;
  showToast(`${roster[idx].name} ist offline`);
  const gen = gameGen;
  const trySkip = () => {
    if (gen !== gameGen || netPhase !== 'playing') return;
    if (currentPlayer !== idx || roster[idx].connected || !canFlip) return;
    // offene Karte(n) des Getrennten zurückdrehen und Zug weitergeben
    const open = flipped.map(c => +c.dataset.idx);
    flipped.forEach(c => c.classList.remove('flipped'));
    flipped = [];
    currentPlayer = nextConnected(idx);
    broadcast({ v: PROTO_V, t: 'skip', cards: open, next: currentPlayer });
    renderChips(); updateBanner();
  };
  trySkip();
  setTimeout(trySkip, 1100); // falls beim Abbruch gerade eine 450/900-ms-Auflösung lief
}

function hostHandleFlip(fromIdx, cardIdx) {
  if (fromIdx !== currentPlayer || !canFlip || flipped.length >= 2) return;
  const card = boardCards()[cardIdx];
  if (!card || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  doFlip(card, fromIdx);
}

function stateSnapshot(youIdx) {
  const cards = boardCards();
  return {
    v: PROTO_V, t: 'state', you: youIdx, deck, numPairs,
    matchedBy: cards.map(c => c.classList.contains('matched') ? +c.dataset.matchedBy : -1),
    open: flipped.map(c => +c.dataset.idx),
    scores, next: currentPlayer, roster: publicRoster(),
  };
}

function startOnlineGame() {
  gameGen++;
  netPhase = 'playing';
  hostLobbyStop(); // Raum aus der offenen Liste nehmen, sobald das Spiel läuft
  const d = makeDeck(numPairs);
  broadcast({ v: PROTO_V, t: 'start', deck: d, numPairs, roster: publicRoster() });
  enterGame(d, roster.map(r => r.name));
}

/* ── Gast-Seite ── */
let joinTimeout = 0;
async function joinRoom(code, name, attempt = 0) {
  destroyPeer();
  setLobbyPhase('connecting', attempt ? 'Verbinde… (2. Versuch)' : 'Verbinde…');
  const iceServers = await getIceServers();
  peer = new Peer({ config: { iceServers } });
  const p = peer;
  clearTimeout(joinTimeout);
  joinTimeout = setTimeout(() => {
    if (p !== peer) return;
    if (attempt === 0) { joinRoom(code, name, 1); return; } // ein automatischer zweiter Versuch
    resetNet();
    lobbyError('Keine Verbindung zum Raum. In diesem Netzwerk ist evtl. keine Direktverbindung möglich – probiere ein anderes WLAN oder mobile Daten.');
  }, 15000);
  p.on('open', () => {
    if (p !== peer) return;
    hostConn = p.connect(NET_PREFIX + code, { reliable: true });
    hostConn.on('open', () => netSend(hostConn, { v: PROTO_V, t: 'join', name, cid: myCid }));
    hostConn.on('data', msg => { if (p === peer) guestOnData(msg); });
    hostConn.on('close', () => guestHostLost());
  });
  p.on('error', err => {
    if (p !== peer) return;
    clearTimeout(joinTimeout);
    resetNet();
    lobbyError(netErrText(err));
  });
}

function guestOnData(msg) {
  if (!msg || msg.v !== PROTO_V) return;
  clearTimeout(joinTimeout);
  switch (msg.t) {
    case 'welcome':
      netRole = 'guest'; netPhase = 'hosting';
      myIndex = msg.you;
      roster = msg.roster;
      $('wait-code').textContent = roomCode;
      renderLobby();
      setLobbyPhase('wait');
      requestWakeLock();
      break;

    case 'reject': {
      const map = {
        full: 'Der Raum ist voll (max. 4 Spieler).',
        started: 'Das Spiel läuft bereits.',
        version: 'Der Host nutzt eine andere Spielversion – Seite bei allen neu laden.',
      };
      resetNet();
      lobbyError(map[msg.reason] || 'Beitritt abgelehnt.');
      break;
    }

    case 'roster':
      roster = msg.roster;
      names = roster.map(r => r.name);
      if (netPhase === 'playing') { renderChips(); updateBanner(); }
      else renderLobby();
      break;

    case 'start':
      gameGen++;
      netPhase = 'playing';
      roster = msg.roster;
      enterGame(msg.deck, roster.map(r => r.name));
      break;

    case 'flip': {
      const card = boardCards()[msg.card];
      if (card && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
        card.classList.add('flipped');
        flipped.push(card);
      }
      break;
    }

    case 'result': {
      const [a, b] = msg.cards.map(i => boardCards()[i]);
      if (!a || !b) break;
      canFlip = false;
      flipped = [];
      resolvePair(a, b, msg.kind === 'match', msg.by, gameGen, msg);
      break;
    }

    case 'skip':
      (msg.cards || []).forEach(i => boardCards()[i]?.classList.remove('flipped'));
      flipped = []; canFlip = true;
      currentPlayer = msg.next;
      renderChips(); updateBanner();
      break;

    case 'state': {
      // Voll-Snapshot nach Rejoin: Board samt gematchten/offenen Karten wiederherstellen
      gameGen++;
      netPhase = 'playing';
      myIndex = msg.you;
      roster = msg.roster;
      enterGame(msg.deck, roster.map(r => r.name));
      const cards = boardCards();
      let matchedCards = 0;
      msg.matchedBy.forEach((by, i) => {
        if (by < 0) return;
        cards[i].classList.add('matched');
        cards[i].style.setProperty('--match-color', COLORS[by]);
        cards[i].dataset.matchedBy = by;
        matchedCards++;
      });
      matched = matchedCards / 2;
      (msg.open || []).forEach(i => {
        const c = cards[i];
        if (c && !c.classList.contains('matched')) { c.classList.add('flipped'); flipped.push(c); }
      });
      scores = msg.scores.slice();
      currentPlayer = msg.next;
      renderChips(); updateBanner();
      break;
    }

    case 'end':
      if (netPhase === 'playing' || $('screen-win').classList.contains('active')) {
        netOverlay(msg.reason === 'closed' ? 'Der Host hat den Raum geschlossen.' : 'Der Host hat das Spiel beendet.');
      } else {
        resetNet();
        lobbyError('Der Host hat den Raum geschlossen.');
      }
      break;
  }
}

function guestHostLost() {
  if (netRole !== 'guest') return;
  if (netPhase === 'playing' || $('screen-win').classList.contains('active')) {
    netOverlay('Verbindung zum Host verloren.');
  } else {
    resetNet();
    lobbyError('Verbindung zum Host verloren.');
  }
}

function netOverlay(text) {
  resetNet();
  releaseWakeLock();
  $('net-overlay-text').textContent = text;
  $('net-overlay').hidden = false;
}
$('btn-overlay-ok').addEventListener('click', () => {
  $('net-overlay').hidden = true;
  setLobbyPhase('choice');
  show('screen-start');
});

/* ── Lobby-UI ── */
const LOBBY_SECS = ['choice', 'create', 'join', 'connecting', 'host', 'wait'];
let lastFormSec = 'choice';

function setLobbyPhase(sec, connectingText) {
  LOBBY_SECS.forEach(s => { $('sec-' + s).hidden = s !== sec; });
  if (sec === 'create' || sec === 'join') lastFormSec = sec;
  if (connectingText) $('connecting-text').textContent = connectingText;
  // Offene Raumliste läuft nur, während die Startauswahl sichtbar ist
  if (sec === 'choice' && lobbyEnabled()) startBrowsing();
  else browseStop();
}
function lobbyError(text) {
  setLobbyPhase(lastFormSec);
  const e = $('lobby-error');
  e.textContent = text;
  e.hidden = false;
}
function hideLobbyError() { $('lobby-error').hidden = true; }

function activatePill(groupId, v) {
  document.querySelectorAll(`#${groupId} .pill`)
    .forEach(x => x.classList.toggle('active', x.dataset.v === String(v)));
}

function selectMode(v) {
  const online = v === 'online';
  $('card-local').hidden = online;
  $('card-online').hidden = !online;
  if (!online && netRole !== 'local') leaveOnline();
  (online ? updateOnlinePairs : updateLocalPairs)();
  hideLobbyError();
  if (online) setLobbyPhase('choice'); // zeigt sofort die offenen Räume
  else browseStop();
}
makePills('mode-pills', selectMode);

$('btn-goto-create').addEventListener('click', () => { hideLobbyError(); setLobbyPhase('create'); });
$('btn-goto-join').addEventListener('click', () => { hideLobbyError(); setLobbyPhase('join'); });
$('btn-create-back').addEventListener('click', () => { hideLobbyError(); setLobbyPhase('choice'); });
$('btn-join-back').addEventListener('click', () => { hideLobbyError(); setLobbyPhase('choice'); });
$('btn-connecting-back').addEventListener('click', () => { resetNet(); setLobbyPhase(lastFormSec); });
$('btn-host-back').addEventListener('click', leaveOnline);
$('btn-wait-back').addEventListener('click', leaveOnline);

$('btn-create').addEventListener('click', () => {
  hideLobbyError();
  roomPublic = lobbyEnabled() && $('create-public').checked;
  const name = $('create-name').value.trim().slice(0, 16) || 'Host';
  localStorage.setItem('kbr-name', name);
  createRoom(name);
});

/* ── Browse: offene Raumliste ── */
function startBrowsing() {
  if (rtBrowse) return; // läuft bereits
  $('browse-list').innerHTML = '<div class="lobby-hint">Suche nach Spielen…</div>';
  browseStart(renderBrowseList);
}
function renderBrowseList(rooms) {
  const el = $('browse-list');
  el.innerHTML = '';
  if (rooms === 'unavailable') { el.innerHTML = '<div class="lobby-hint">Offene Lobby ist nicht konfiguriert.</div>'; return; }
  if (rooms === 'error') { el.innerHTML = '<div class="lobby-hint">Verbindung zur Lobby fehlgeschlagen.</div>'; return; }
  if (!rooms.length) { el.innerHTML = '<div class="lobby-hint">Keine offenen Spiele – erstelle selbst einen Raum!</div>'; return; }
  rooms.forEach(r => {
    const row = document.createElement('button');
    row.className = 'browse-row';
    const nm = document.createElement('div');
    nm.className = 'roster-name';
    nm.textContent = `🎮 ${r.host || 'Spiel'}`;
    const tag = document.createElement('div');
    tag.className = 'roster-tag';
    tag.textContent = `${r.players}/${r.max} Spieler`;
    const join = document.createElement('div');
    join.className = 'browse-join';
    join.textContent = 'Beitreten →';
    row.append(nm, tag, join);
    row.addEventListener('click', () => joinFromBrowse(r.code));
    el.appendChild(row);
  });
}
function joinFromBrowse(code) {
  const name = $('browse-name').value.trim().slice(0, 16) || 'Gast';
  localStorage.setItem('kbr-name', name);
  lastFormSec = 'choice'; // ein fehlgeschlagener Beitritt führt zurück zur Raumliste
  browseStop();
  roomCode = code;
  joinRoom(code, name);
}

$('join-code').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});
$('btn-join').addEventListener('click', () => {
  hideLobbyError();
  const code = $('join-code').value.trim();
  if (code.length !== 3) { lobbyError('Bitte den 3-stelligen Raum-Code eingeben.'); return; }
  const name = $('join-name').value.trim().slice(0, 16) || 'Gast';
  localStorage.setItem('kbr-name', name);
  roomCode = code;
  joinRoom(code, name);
});

$('btn-online-start').addEventListener('click', () => {
  if (roster.filter(r => r.connected !== false).length >= 2) startOnlineGame();
});

const shareUrl = () => location.origin + location.pathname + '?join=' + roomCode;
$('btn-copy').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(shareUrl());
    $('btn-copy').textContent = '✓ Kopiert';
    setTimeout(() => { $('btn-copy').textContent = 'Link kopieren'; }, 2000);
  } catch (e) {}
});
if (navigator.share) {
  $('btn-share').hidden = false;
  $('btn-share').addEventListener('click', () => {
    navigator.share({ title: 'Memory · KBRail Edition', text: 'Spiel mit! Raum-Code: ' + roomCode, url: shareUrl() })
      .catch(() => {});
  });
}

function renderLobby() {
  $('room-code-display').textContent = roomCode;
  ['host-roster', 'wait-roster'].forEach(id => {
    const el = $(id);
    el.innerHTML = '';
    roster.forEach((r, i) => {
      const row = document.createElement('div');
      row.className = 'roster-row' + (r.connected === false ? ' offline' : '');
      const dot = document.createElement('div');
      dot.className = 'pdot';
      dot.style.background = COLORS[i];
      const nm = document.createElement('div');
      nm.className = 'roster-name';
      nm.textContent = r.name;
      const tag = document.createElement('div');
      tag.className = 'roster-tag';
      tag.textContent = [i === 0 ? 'Host' : '', i === myIndex ? 'du' : '', r.connected === false ? 'offline' : '']
        .filter(Boolean).join(' · ');
      row.append(dot, nm, tag);
      el.appendChild(row);
    });
  });
  const connected = roster.filter(r => r.connected !== false).length;
  $('btn-online-start').disabled = connected < 2;
  $('host-hint').hidden = connected >= 2;
}

/* ── Init ── */
renderNameInputs();
show('screen-start');

if (typeof Peer === 'undefined') {
  // Standalone-Version ohne PeerJS: Online-Modus komplett ausblenden
  $('mode-pills').hidden = true;
  $('card-online').hidden = true;
} else {
  const savedName = localStorage.getItem('kbr-name') || '';
  $('create-name').value = savedName;
  $('join-name').value = savedName;
  $('browse-name').value = savedName;
  if (lobbyEnabled()) {
    $('browse-wrap').hidden = false;
    $('public-toggle-row').hidden = false;
  }
  const joinParam = new URLSearchParams(location.search).get('join');
  if (joinParam && /^[A-Za-z0-9]{3}$/.test(joinParam)) {
    activatePill('mode-pills', 'online');
    selectMode('online');
    setLobbyPhase('join');
    $('join-code').value = joinParam.toUpperCase();
  }
}
</script>
</body>
</html>
